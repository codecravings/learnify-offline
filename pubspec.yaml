name: vidyasetu
description: "Competitive Learning Arena - Battle. Learn. Conquer."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # On-device AI — Gemma 4 E2B via LiteRT-LM
  flutter_gemma: ^0.13.5

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  flutter_svg: ^2.0.17
  lottie: ^3.3.1
  glassmorphism: ^3.0.0

  # Navigation
  go_router: ^14.8.1

  # Local Storage
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.4
  shared_preferences: ^2.3.0

  # Image input (multimodal — scan textbook)
  image_picker: ^1.1.2

  # Utils
  uuid: ^4.5.1
  intl: ^0.20.2
  timeago: ^3.7.0
  equatable: ^2.0.7
  json_annotation: ^4.9.0
  freezed_annotation: ^3.0.0
  flutter_markdown: ^0.7.7+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  json_serializable: ^6.9.5
  freezed: ^3.0.6
  riverpod_generator: ^2.6.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/characters/
    - assets/animations/
    - assets/icons/
    - assets/data/
